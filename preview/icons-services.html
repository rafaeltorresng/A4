<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
body{padding:22px;background:#fff;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;max-width:720px;}
.ic{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 10px;border-radius:18px;background:#F7F9FC;border:1px solid #E5E7EB;}
.box{width:56px;height:56px;border-radius:14px;background:#fff;border:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.l{font-family:'Poppins',sans-serif;font-weight:700;font-size:11.5px;color:#0F2E63;text-align:center;line-height:1.25;}
.s{font-family:'DM Sans',sans-serif;font-size:9.5px;color:#6B7280;text-align:center;margin-top:-4px;letter-spacing:.02em;}
svg{display:block;}
</style></head><body>
<div class="grid">

  <!-- Indenização via App — clean phone silhouette with screen + pin -->
  <div class="ic">
    <div class="box">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <rect x="6.5" y="2.75" width="11" height="18.5" rx="2.5" stroke="#1E4FA1" stroke-width="1.6"/>
        <path d="M10.5 18.5h3" stroke="#1E4FA1" stroke-width="1.4" stroke-linecap="round"/>
        <rect x="8.5" y="5.25" width="7" height="7.5" rx="1" fill="#E7F0FF"/>
        <circle cx="12" cy="8.75" r="1.1" fill="#1E4FA1"/>
        <path d="M12 8.75v2.1" stroke="#1E4FA1" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="l">Indenização via App</div>
    <div class="s">Uber · 99 · iFood</div>
  </div>

  <!-- Processos contra Terceiros — scale of justice, balanced -->
  <div class="ic">
    <div class="box">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <path d="M12 3.5v16" stroke="#1E4FA1" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="12" cy="3.5" r="1.3" fill="#1E4FA1"/>
        <path d="M6 19.75h12" stroke="#1E4FA1" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M6 6.5h12" stroke="#1E4FA1" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M6 6.5 3.5 12h5L6 6.5Z" fill="#E7F0FF" stroke="#1E4FA1" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M18 6.5 15.5 12h5L18 6.5Z" fill="#E7F0FF" stroke="#1E4FA1" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="l">Processos contra Terceiros</div>
    <div class="s">Danos · Cobrança</div>
  </div>

  <!-- Seguro de Passageiro (APP) — clean shield with check -->
  <div class="ic">
    <div class="box">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <path d="M12 2.5 4 5v6.2c0 4.6 3.3 8.8 8 10.3 4.7-1.5 8-5.7 8-10.3V5l-8-2.5Z" fill="#E7F0FF" stroke="#1E4FA1" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="m8.5 12 2.5 2.5 4.5-5" stroke="#1E4FA1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="l">Seguro de Passageiro</div>
    <div class="s">APP · Apólice privada</div>
  </div>

  <!-- Casos DPVAT (Legado) — document with folded corner, clean -->
  <div class="ic">
    <div class="box">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <path d="M6 3h8l4 4v13a1.5 1.5 0 0 1-1.5 1.5h-10.5A1.5 1.5 0 0 1 4.5 20V4.5A1.5 1.5 0 0 1 6 3Z" fill="#fff" stroke="#1E4FA1" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M14 3v4h4" stroke="#1E4FA1" stroke-width="1.6" stroke-linejoin="round" fill="#E7F0FF"/>
        <path d="M7.5 12h9M7.5 15h9M7.5 18h5.5" stroke="#1E4FA1" stroke-width="1.4" stroke-linecap="round" opacity=".5"/>
      </svg>
    </div>
    <div class="l">Casos DPVAT</div>
    <div class="s">Legado · pré-2025</div>
  </div>

</div>
</body></html>
