<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:0;background:#EEF2F7;font-family:'Poppins',sans-serif;}
.stage{display:flex;gap:14px;padding:18px;align-items:stretch;}
.card{flex:1;min-width:0;height:200px;border-radius:18px;overflow:hidden;position:relative;box-shadow:0 10px 30px rgba(15,46,99,.08);border:1px solid rgba(255,255,255,.6);}

/* 1 — Soft brand gradient mesh (navy + yellow washes on page grey) */
.mesh{background:
  radial-gradient(circle at 18% 22%, rgba(30,79,161,.35), transparent 55%),
  radial-gradient(circle at 82% 78%, rgba(255,196,49,.28), transparent 55%),
  radial-gradient(circle at 60% 30%, rgba(15,46,99,.18), transparent 60%),
  #EEF2F7;
}

/* 2 — Deep navy with subtle geometric lines (brand-safe, editorial) */
.navy{background:#0F2E63;position:relative;}
.navy svg{position:absolute;inset:0;width:100%;height:100%;}

/* 3 — Editorial crop: hero-bg with deep navy overlay (the brand hero treatment) */
.photo{background-image:url('../assets/hero-bg.png');background-size:cover;background-position:center;}
.photo::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(15,46,99,.55) 0%, rgba(30,79,161,.85) 100%);}

.lbl{position:absolute;left:10px;bottom:10px;z-index:2;font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#fff;background:rgba(0,0,0,.45);padding:3px 7px;border-radius:5px;letter-spacing:.02em;}
.lbl.dark{color:#0F2E63;background:rgba(255,255,255,.7);}
</style></head><body>
<div class="stage">

  <div class="card mesh">
    <span class="lbl dark">Brand mesh · clean background</span>
  </div>

  <div class="card navy">
    <svg viewBox="0 0 400 200" preserveAspectRatio="none">
      <path d="M-20 180 Q 120 80, 240 70 T 430 10" stroke="#fff" stroke-width="0.6" fill="none" opacity=".18"/>
      <path d="M-40 200 Q 140 110, 260 100 T 440 40" stroke="#FFC431" stroke-width="1" fill="none" opacity=".35"/>
      <path d="M-60 220 Q 160 140, 280 130 T 460 70" stroke="#fff" stroke-width="0.5" fill="none" opacity=".12"/>
    </svg>
    <span class="lbl">Navy + curves · editorial</span>
  </div>

  <div class="card photo">
    <span class="lbl">Photo + navy overlay · hero treatment</span>
  </div>

</div>
</body></html>
