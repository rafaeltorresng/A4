<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>A QU4TRO · Landing Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #EEF2F7; }
  body {
    font-family: 'Montserrat', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  /* Background pattern */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(30,79,161,.06), transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(255,196,49,.08), transparent 55%),
      #EEF2F7;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 10px 24px rgba(37,211,102,.45), 0 2px 6px rgba(0,0,0,.2); }
    50% { transform: scale(1.06); box-shadow: 0 14px 32px rgba(37,211,102,.55), 0 2px 6px rgba(0,0,0,.2); }
  }
  /* Scrollbar dentro do iPhone */
  .scroll-area::-webkit-scrollbar { width: 0; }
  .scroll-area { scrollbar-width: none; }


</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>



<script>
  const CONFIG = {
    primary: "#1E4FA1",
    accent: "#FFC431",
    heroTone: "human"
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components/sections.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  function App() {
    const { primary, accent, heroTone } = CONFIG;

    return (
      <IOSDevice dark={false} showHomeIndicator={true}>
        <div className="scroll-area" style={{
          position: 'absolute', inset: 0,
          overflowY: 'auto', overflowX: 'hidden',
          background: '#fff',
          WebkitOverflowScrolling: 'touch',
        }}>
          <IOSStatusBar dark={false}/>
          <TopBar primary={primary}/>
          <div data-screen-label="Landing">
            <Hero primary={primary} accent={accent} heroTone={heroTone}/>
            <Problema primary={primary}/>
            <ComoFunciona primary={primary} accent={accent}/>
            <Especialidades primary={primary} accent={accent}/>
            <ProvaSocial primary={primary} accent={accent}/>
            <QuemSomos primary={primary} accent={accent}/>
            <FAQ primary={primary}/>
            <CTAFinal primary={primary} accent={accent}/>
            <Footer primary={primary} accent={accent}/>
          </div>
          <div style={{ height: 20 }}/>
        </div>
        <FloatingCTA/>
      </IOSDevice>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
