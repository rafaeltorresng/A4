<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
body{padding:22px;background:#EEF2F7;}
.glass{background:rgba(255,255,255,.6);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,.8);border-radius:24px;box-shadow:0 10px 30px rgba(15,46,99,.08);padding:18px 20px;max-width:420px;}
.soft{background:rgba(247,249,252,.8);border:1px solid #E5E7EB;border-radius:18px;padding:18px 20px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.03);margin-top:14px;}
.eye{font-family:'Poppins',sans-serif;font-weight:700;font-size:9px;letter-spacing:.12em;color:#1E4FA1;text-transform:uppercase;}
.t{font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;color:#0F2E63;margin-top:6px;}
.d{font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.5;color:#6B7280;margin-top:6px;}
</style></head><body>
<div class="glass">
  <div class="eye">Glass card</div>
  <div class="t">Histórias reais de quem confiou.</div>
  <div class="d">rgba(255,255,255,.6) + blur(20px) saturate(180%). Used for testimonials, FAQ, hero stats.</div>
</div>
<div class="soft">
  <div class="eye">Soft card</div>
  <div class="t">Indenização via App</div>
  <div class="d">#F7F9FC + border #E5E7EB. Used for service grid cards.</div>
</div>
</body></html>
