<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AQU4TRO · UI Kit (Landing)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; min-height:100%; background:var(--neutral-200); }
  body { font-family:'DM Sans', system-ui, sans-serif; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background: radial-gradient(circle at 20% 10%, rgba(30,79,161,.06), transparent 55%), radial-gradient(circle at 85% 85%, rgba(255,196,49,.08), transparent 55%), var(--neutral-200); z-index:0; }
  #stage { position:relative; width:100%; min-height:100dvh; display:flex; justify-content:center; align-items:center; padding:40px 0; }
  .scroll-area::-webkit-scrollbar { width:0; }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <IOSDevice title="AQU4TRO Landing">
        <div data-screen-label="Landing" style={{ background:'#f5f5f5', minHeight:'100%' }}>
          <TopBar/>
          <Hero/>
          <Especialidades/>
          <ComoFunciona/>
          <QuemSomos/>
          <FAQ/>
          <CTAFinal/>
          <Footer/>
        </div>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
