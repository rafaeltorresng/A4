<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>A QU4TRO · Especialistas em Indenização</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--neutral-200); }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  #stage {
    position: relative;
    width: 100%;
    min-height: 100dvh;
  }
  /* Background pattern */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(30,79,161,.06), transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(255,196,49,.08), transparent 55%),
      var(--neutral-200);
    z-index: 0;
  }
  #root {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    box-shadow: 0 0 0 1px rgba(0,0,0,.04);
    background: var(--white);
    transition: max-width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @media (min-width: 1024px) {
    #root {
      max-width: none;
      box-shadow: none;
    }
  }
  
  /* Animations & Effects */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal.active {
    opacity: 1;
    transform: translateY(0);
  }

  @keyframes dotPulse {
    0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
    70% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }

  .pulse-dot {
    animation: dotPulse 2s infinite;
  }

  @keyframes shine {
    0% { left: -100%; transition: none; }
    20% { left: 100%; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    100% { left: 100%; }
  }

  .btn-shine {
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, filter 0.2s ease;
  }

  .btn-shine:active {
    transform: scale(0.96);
    filter: brightness(0.9);
  }

  .btn-shine::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-25deg);
    animation: shine 4s infinite;
  }

  .reveal strong {
    color: #1E4FA1;
    font-weight: 700;
  }

  /* Utility */
  .scroll-area::-webkit-scrollbar { width: 0; }
  .scroll-area { scrollbar-width: none; }

</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script>
  const CONFIG = {
    primary: "#1E4FA1",
    accent: "#FFC431"
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/primitives.jsx"></script>
<script type="text/babel" src="components/sections.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  function App() {
    const { primary, accent } = CONFIG;

    useEffect(() => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
      return () => observer.disconnect();
    }, []);

    return (
      <div style={{ position: 'relative', minHeight: '100dvh', background: '#F9F7F5' }}>
        <TopBar primary={primary}/>
        <div data-screen-label="Landing">
          <div className="reveal"><Hero primary={primary} accent={accent}/></div>
          <div className="reveal section-especialidades"><Especialidades primary={primary} accent={accent}/></div>
          <div className="reveal section-comofunciona"><ComoFunciona primary={primary} accent={accent}/></div>
          <div className="reveal"><InstagramBanner primary={primary}/></div>
          <div className="reveal section-instagram-profile"><InstagramProfilePreview /></div>
          <div className="reveal section-problema"><Problema primary={primary}/></div>
          <div className="reveal section-quemsomos"><QuemSomos primary={primary} accent={accent}/></div>
          <div className="reveal section-faq"><FAQ primary={primary}/></div>
          <div className="reveal section-ctafinal"><CTAFinal primary={primary} accent={accent}/></div>
          <Footer accent={accent}/>
        </div>
        <FloatingCTA/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
