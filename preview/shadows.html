<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
body { padding:22px; background:#EEF2F7; }
.row { display:flex; gap:22px; flex-wrap:wrap; }
.box { width:120px; height:80px; background:#fff; border-radius:16px; display:flex;align-items:center;justify-content:center; font-family:'Poppins',sans-serif;font-weight:700;font-size:11px;color:#0F2E63; }
.s1 { box-shadow: 0 2px 5px rgba(0,0,0,.05); }

.cap { font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#6B7280;margin-top:6px;text-align:center; }
.wrap { display:flex; flex-direction:column; align-items:center;}

<div class="row">
  <div class="wrap"><div class="box s1">xs</div><div class="cap">0 2 5 rgba 0.05</div></div>

  <div class="wrap"><div class="box s3">lg</div><div class="cap">0 10 30 blue 0.08</div></div>
  <div class="wrap"><div class="box s4">CTA</div><div class="cap">0 10 24 green 0.35</div></div>
